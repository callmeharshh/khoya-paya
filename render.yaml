# Render Blueprint — deploys Khoya-Paya as a single always-on web service.
# A persistent Node process means the in-memory store works exactly like local.
# In Render: New → Blueprint → connect this repo. Set GEMINI_API_KEY when prompted.
services:
  - type: web
    name: khoya-paya
    runtime: node
    plan: free
    buildCommand: npm install --include=dev && npm run build
    startCommand: npm run start
    envVars:
      - key: NODE_VERSION
        value: "20.18.0"
      - key: LLM_PROVIDER
        value: gemini
      - key: GEMINI_MODEL
        value: gemini-2.5-flash
      # Secret — enter this in the Render dashboard, NOT in this file.
      - key: GEMINI_API_KEY
        sync: false
